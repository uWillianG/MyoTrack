name: myotrack

services:
  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - frontend-dist:/srv
      - caddy-data:/data
    depends_on:
      - api
      - frontend

  frontend:
    build: ./frontend
    volumes:
      - frontend-dist:/srv

  api:
    build:
      context: ./backend
      dockerfile: MyoTrack.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=myotrack;Username=myotrack;Password=${POSTGRES_PASSWORD:-dev-only-password}
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-dev-only-signing-key-change-me-in-production-0123456789}
      Storage__Endpoint: http://minio:9000
      # Endpoint que o BROWSER alcança para URLs pré-assinadas (rota /myotrack-media/* no Caddy).
      Storage__PublicEndpoint: ${MEDIA_PUBLIC_ENDPOINT:-http://localhost}
      Storage__AccessKey: ${MINIO_ROOT_USER:-myotrack}
      Storage__SecretKey: ${MINIO_ROOT_PASSWORD:-dev-only-password}
      Cors__AllowedOrigins__0: ${FRONTEND_ORIGIN:-http://localhost}
      Billing__SecretKey: ${STRIPE_SECRET_KEY:-}
      Billing__WebhookSecret: ${STRIPE_WEBHOOK_SECRET:-}
      Billing__ProPriceId: ${STRIPE_PRO_PRICE_ID:-}
      Billing__PublicBaseUrl: ${FRONTEND_ORIGIN:-http://localhost}
      # Base dos links enviados por e-mail e do redirect do login com Google.
      App__PublicBaseUrl: ${FRONTEND_ORIGIN:-http://localhost}
      Email__Host: ${EMAIL_HOST:-smtp.gmail.com}
      Email__Port: ${EMAIL_PORT:-587}
      Email__User: ${EMAIL_USER:-}
      Email__Password: ${EMAIL_PASSWORD:-}
      Email__From: ${EMAIL_FROM:-}
      Auth__Google__ClientId: ${GOOGLE_OAUTH_CLIENT_ID:-}
      Auth__Google__ClientSecret: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./backend
      dockerfile: MyoTrack.Worker/Dockerfile
    environment:
      DOTNET_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=myotrack;Username=myotrack;Password=${POSTGRES_PASSWORD:-dev-only-password}
      Llm__Provider: ${LLM_PROVIDER:-}
      Llm__AnthropicApiKey: ${ANTHROPIC_API_KEY:-}
      Llm__Model: ${LLM_MODEL:-claude-opus-4-8}
      Llm__GeminiApiKey: ${GEMINI_API_KEY:-}
      Llm__GeminiModel: ${GEMINI_MODEL:-gemini-3.5-flash}
      Llm__GeminiImageModel: ${GEMINI_IMAGE_MODEL:-gemini-3.1-flash-image}
      Storage__Endpoint: http://minio:9000
      Storage__AccessKey: ${MINIO_ROOT_USER:-myotrack}
      Storage__SecretKey: ${MINIO_ROOT_PASSWORD:-dev-only-password}
      Vision__BaseUrl: http://vision:8000
    depends_on:
      postgres:
        condition: service_healthy

  vision:
    build: ./vision
    environment:
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-myotrack}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-dev-only-password}
      S3_BUCKET: myotrack-media
    ports:
      # Exposto localmente só para desenvolvimento (worker rodando fora do compose).
      - "127.0.0.1:8000:8000"
    depends_on:
      - minio
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: myotrack
      POSTGRES_USER: myotrack
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev-only-password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      # 5433 no host para não conflitar com um PostgreSQL nativo na 5432.
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myotrack -d myotrack"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-myotrack}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-dev-only-password}
    volumes:
      - minio-data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  minio-data:
  caddy-data:
  frontend-dist:
